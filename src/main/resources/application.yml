spring:
  data:
    redis:
      host: master.haemeok-redis-cluster.nimena.apn2.cache.amazonaws.com
      port: 6379
      password: ${REDIS_PASSWORD}
      ssl:
          enabled: true

  # Spring AI 1.0 — 레시피 챗봇(Upstage Solar) 설정.
  # 주의: 최상위 `openai.*` 블록은 Grok SDK(com.openai:openai-java)용 별도 prefix이므로 서로 충돌 없음.
  # Upstage는 기본 /v1/chat/completions 경로를 쓰지 않으므로 completions-path 명시 필수.
  ai:
    openai:
      base-url: https://api.upstage.ai
      api-key: ${UPSTAGE_API_KEY}
      chat:
        completions-path: /v1/solar/chat/completions
        options:
          model: solar-pro3
          temperature: 0.5
          max-tokens: 600

  # Spring Boot 3.4+ RestClient/HttpClient 공용 타임아웃. Spring AI 내부 client도 이 값을 사용.
  http:
    client:
      connect-timeout: 5s
      read-timeout: 30s

  profiles:
    active: local
  mvc:
    async:
      request-timeout: 600000   # 10분 (밀리초)

  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100

  # Flyway 공통 설정. 실제 활성화 여부는 프로파일별 파일에서 제어.
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  forward-headers-strategy: framework

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    url: /v3/api-docs
    path: /swagger-ui

opensearch:
  host: ${OPENSEARCH_HOST}

search:
  engine: auto  # auto | opensearch | querydsl

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  security:
    enabled: false

  metrics:
    enable:
      all: true

    distribution:
      # 1) 특정 percentiles 를 계산해서 노출
      percentiles:
        http.server.requests: 0.5,0.95,0.99

      # 2) histogram bucket (le 라벨이 붙은) 을 수집
      percentiles-histogram:
        http.server.requests: true


ai:
  quota:
    per-day: 2
    youtube-per-day: 3
    timezone: "Asia/Seoul"
# 챗봇 쿼터/킬스위치/분류기 활성/질문 최대길이는 chat_config 테이블에서 단일 관리
# (db_and_logging.md §1.1 참조 — 운영 중 DB UPDATE로 즉시 반영)

app:
  recipe:
    official-user-id: 90121
  vertex:
    locations: "global, us-central1, us-east1"
    # 한 번 429 뜬 지역을 몇 ms 동안 제외할지 (여기선 30초)
    credentials: ${GEMINI_CREDENTIALS}
    cooldown-ms: 30000

lemonsqueezy:
  webhook-secret: ${LEMON_WEBHOOK_SECRET}
  api-key: ${LEMON_API_KEY}